version: '3.8'

services:
  # Database Service (MariaDB)
  db:
    image: mariadb:10.4
    container_name: dectscam_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dectscam_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: dectscam_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dectscam_network

  # Backend Service (Laravel API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dectscam_backend
    restart: unless-stopped
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: dectscam_db
      DB_USERNAME: dectscam_user
      DB_PASSWORD: secret
    depends_on:
      - db
    networks:
      - dectscam_network

  # Frontend Service (React / Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dectscam_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - dectscam_network

volumes:
  db_data:
    driver: local

networks:
  dectscam_network:
    driver: bridge
